services:
  - type: web
    name: constructask-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./constructask.db
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://constructask.vercel.app,https://constructask-superstove.vercel.app,http://localhost,https://localhost,capacitor://localhost
      - key: DPP_ISSUER_ID
        value: anton-steel-works
      - key: DPP_ISSUER_NAME
        value: Anton Steel Works
